<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <mat-card class="w-full max-w-md shadow-lg">
    <mat-card-content class="p-6">
      <div class="text-center mb-6">
        <mat-icon class="text-6xl text-purple-600 mb-4">lock</mat-icon>
        <h2 class="text-2xl font-bold text-gray-800">Change Password</h2>
      </div>
      <form #changePasswordForm="ngForm" (ngSubmit)="onSubmit(changePasswordForm)">
        <mat-form-field class="w-full mb-4">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="username" name="username">
          <mat-error>Please provide your username</mat-error>
        </mat-form-field>
        <mat-form-field class="w-full mb-4">
          <mat-label>Current Password</mat-label>
          <input matInput type="password" [(ngModel)]="oldPassword" name="oldPassword">
          <mat-error>Please provide your current password</mat-error>
        </mat-form-field>
        <mat-form-field class="w-full mb-6">
          <mat-label>New Password</mat-label>
          <input matInput type="password" [(ngModel)]="newPassword" name="newPassword">
          <mat-error>Please choose a new password</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="w-full py-3 text-lg">
          Change Password
        </button>
      </form>
      <div *ngIf="this.wrongUsername" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        <h2 class="font-bold">Username is wrong!</h2>
      </div>
      <div *ngIf="this.wrongPassword" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        <h2 class="font-bold">Current password is wrong!</h2>
      </div>
      <div *ngIf="errorService.errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        {{ errorService.errorMessage }}
      </div>
    </mat-card-content>
  </mat-card>
</div>
