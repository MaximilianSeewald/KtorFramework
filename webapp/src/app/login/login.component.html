<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <mat-card class="w-full max-w-md shadow-lg">
    <mat-card-content class="p-6">
      <div class="text-center mb-6">
        <mat-icon class="text-6xl text-purple-600 mb-4">login</mat-icon>
        <h2 class="text-2xl font-bold text-gray-800">Sign In</h2>
      </div>
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
        <mat-form-field class="w-full mb-4">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="username" name="username">
          <mat-error>Please provide a valid username</mat-error>
        </mat-form-field>
        <mat-form-field class="w-full mb-6">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password">
          <mat-error>Please provide a valid password</mat-error>
        </mat-form-field>
        <button mat-raised-button color="primary" class="w-full py-3 text-lg">
          Sign In
        </button>
      </form>
      <div *ngIf="errorService.errorMessage" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
        {{ errorService.errorMessage }}
      </div>
    </mat-card-content>
  </mat-card>
</div>
