<!-- Page Header -->
<div class="px-6 pt-10 pb-6 max-w-md mx-auto">
  <div class="flex items-center gap-3 mb-1">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center"
         style="background-color: #EBF3FF;">
      <mat-icon style="color: #0071E3; font-size: 20px; width: 20px; height: 20px;">calculate</mat-icon>
    </div>
    <h1 class="text-2xl font-semibold tracking-tight" style="color: #1D1D1F;">Grade Calculator</h1>
  </div>
  <p class="text-sm" style="color: #6E6E73;">Upload a .csv file with names and points to generate grades.</p>
</div>

<div class="max-w-md mx-auto px-6 pb-16">
  <div class="rounded-2xl p-6"
       style="background-color: #FFFFFF; border: 1px solid #E8E8ED; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <h2 class="text-xs font-semibold uppercase tracking-wider mb-5" style="color: #6E6E73;">Upload .csv File</h2>

    <div class="flex items-center gap-3 mb-5">
      <!-- Points Input -->
      <div class="flex-grow">
        <label class="block text-sm font-medium mb-1.5" style="color: #1D1D1F;">Max Points</label>
        <input type="number" [(ngModel)]="points"
               placeholder="e.g. 100"
               class="w-full px-4 py-2.5 text-sm rounded-xl border"
               style="background-color: #F5F5F7; border-color: #D2D2D7; color: #1D1D1F;">
      </div>

      <!-- File Input -->
      <div class="flex-shrink-0 self-end">
        <label for="fileUpload"
               class="block text-sm font-medium px-4 py-2.5 rounded-xl cursor-pointer apple-btn text-center"
               style="background-color: #F5F5F7; color: #1D1D1F; border: 1px solid #D2D2D7; white-space: nowrap;">
          Choose File
        </label>
        <input id="fileUpload" type="file" (change)="onFileSelected($event)" class="hidden" accept=".csv">
      </div>
    </div>

    <!-- Selected File Name -->
    <div *ngIf="fileName"
         class="flex items-center gap-2 px-3 py-2 rounded-xl mb-4"
         style="background-color: #EBF3FF; border: 1px solid #C3DEFF;">
      <mat-icon style="color: #0071E3; font-size: 16px; width: 16px; height: 16px;">description</mat-icon>
      <span class="text-sm font-medium" style="color: #0071E3;">{{ fileName }}</span>
    </div>

    <!-- Generate Button -->
    <button (click)="onUpload()"
            class="w-full py-3 rounded-full text-sm font-semibold apple-btn"
            style="background-color: #0071E3; color: #FFFFFF;">
      Generate Grades
    </button>

    <p *ngIf="message" class="mt-4 text-sm text-center" style="color: #FF3B30;">{{ message }}</p>
  </div>
</div>
