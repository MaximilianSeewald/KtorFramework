<!-- Page Header -->
<div class="px-6 pt-10 pb-6 max-w-md mx-auto">
  <div class="flex items-center gap-3 mb-1">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center"
         style="background-color: #EBF3FF;">
      <mat-icon style="color: #0071E3; font-size: 20px; width: 20px; height: 20px;">person</mat-icon>
    </div>
    <h1 class="text-2xl font-semibold tracking-tight" style="color: #1D1D1F;">User Information</h1>
  </div>
  <p class="text-sm" style="color: #6E6E73;">Manage your account and group settings.</p>
</div>

<div *ngIf="user" class="max-w-md mx-auto px-6 pb-16 space-y-4">

  <!-- Profile Card -->
  <div class="rounded-2xl p-6"
       style="background-color: #FFFFFF; border: 1px solid #E8E8ED; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <h2 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color: #6E6E73;">Profile</h2>
    <div class="space-y-3">
      <div class="flex justify-between items-center py-2 border-b" style="border-color: #F0F0F5;">
        <span class="text-sm" style="color: #6E6E73;">Name</span>
        <span class="text-sm font-medium" style="color: #1D1D1F;">{{ user.name }}</span>
      </div>
      <div class="flex justify-between items-center py-2">
        <span class="text-sm" style="color: #6E6E73;">Group</span>
        <span class="text-sm font-medium" style="color: #1D1D1F;">{{ user.userGroup || '—' }}</span>
      </div>
    </div>
    <div class="mt-5 pt-4 border-t" style="border-color: #F0F0F5;">
      <button routerLink="/change-password"
              class="w-full py-2.5 rounded-xl text-sm font-medium apple-btn"
              style="background-color: #F5F5F7; color: #1D1D1F; border: 1px solid #D2D2D7;">
        Change Password
      </button>
    </div>
  </div>

  <!-- No Group: Create / Join -->
  <div *ngIf="!user.userGroup" class="rounded-2xl p-6"
       style="background-color: #FFFFFF; border: 1px solid #E8E8ED; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <h2 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color: #6E6E73;">Group</h2>
    <div class="space-y-3 mb-4">
      <input
        type="text"
        [(ngModel)]="newGroupName"
        placeholder="Group name"
        class="w-full px-4 py-2.5 text-sm rounded-xl border"
        style="background-color: #F5F5F7; border-color: #D2D2D7; color: #1D1D1F;"
      />
      <input
        type="password"
        [(ngModel)]="newGroupPassword"
        placeholder="Group password"
        class="w-full px-4 py-2.5 text-sm rounded-xl border"
        style="background-color: #F5F5F7; border-color: #D2D2D7; color: #1D1D1F;"
      />
    </div>
    <div class="flex gap-3">
      <button (click)="createGroup()"
              class="flex-1 py-2.5 rounded-xl text-sm font-medium apple-btn"
              style="background-color: #0071E3; color: #FFFFFF;">
        Create Group
      </button>
      <button (click)="joinGroup()"
              class="flex-1 py-2.5 rounded-xl text-sm font-medium apple-btn"
              style="background-color: #F5F5F7; color: #1D1D1F; border: 1px solid #D2D2D7;">
        Join Group
      </button>
    </div>
  </div>

  <!-- Has Group: Admin controls -->
  <div *ngIf="user.userGroup && isAdmin" class="rounded-2xl p-6"
       style="background-color: #FFFFFF; border: 1px solid #E8E8ED; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <h2 class="text-xs font-semibold uppercase tracking-wider mb-4" style="color: #6E6E73;">Admin Controls</h2>
    <div class="flex gap-2 mb-4">
      <input
        type="password"
        [(ngModel)]="newGroupPassword"
        placeholder="New group password"
        class="flex-grow px-4 py-2.5 text-sm rounded-xl border"
        style="background-color: #F5F5F7; border-color: #D2D2D7; color: #1D1D1F;"
      />
      <button (click)="changeGroupPassword()"
              class="px-4 py-2.5 rounded-xl text-sm font-medium apple-btn"
              style="background-color: #0071E3; color: #FFFFFF; white-space: nowrap;">
        Update
      </button>
    </div>
    <div class="pt-4 border-t" style="border-color: #F0F0F5;">
      <button (click)="deleteGroup()"
              class="w-full py-2.5 rounded-xl text-sm font-medium apple-btn"
              style="background-color: #FFF2F1; color: #FF3B30; border: 1px solid #FFD5D2;">
        Delete Group
      </button>
    </div>
  </div>

  <!-- Has Group: Member controls -->
  <div *ngIf="user.userGroup && !isAdmin" class="rounded-2xl p-6"
       style="background-color: #FFFFFF; border: 1px solid #E8E8ED; box-shadow: 0 1px 4px rgba(0,0,0,0.06);">
    <button (click)="leaveGroup()"
            class="w-full py-2.5 rounded-xl text-sm font-medium apple-btn"
            style="background-color: #FFF2F1; color: #FF3B30; border: 1px solid #FFD5D2;">
      Leave Group
    </button>
  </div>

</div>

<div *ngIf="errorService.errorMessage"
     class="max-w-md mx-auto px-6 mt-4">
  <div class="p-3 rounded-xl text-sm"
       style="background-color: #FFF2F1; color: #FF3B30; border: 1px solid #FFD5D2;">
    {{ errorService.errorMessage }}
  </div>
</div>
