<div class="app-shell">
  <nav class="site-header" aria-label="Primary navigation">
    <div class="header-inner">
      <a routerLink="/" class="brand-link" aria-label="Maximilian Seewald home">
        <span class="brand-mark">MS</span>
        <span class="brand-copy">
          <strong>Maximilian Seewald</strong>
          <small>Software Portfolio</small>
        </span>
      </a>

      <div class="nav-actions">
        <a *ngIf="authService.isLoggedIn" routerLink="/user" class="nav-link">
          <mat-icon aria-hidden="true">person</mat-icon>
          User
        </a>
        <a *ngIf="authService.isLoggedIn" routerLink="/dashboard" class="nav-link">
          <mat-icon aria-hidden="true">checklist</mat-icon>
          Shopping List
        </a>
        <a *ngIf="authService.isLoggedIn" routerLink="/recipe" class="nav-link">
          <mat-icon aria-hidden="true">restaurant</mat-icon>
          Recipes
        </a>
        <button *ngIf="authService.isLoggedIn" (click)="logout()" class="nav-button dark-button">
          <mat-icon aria-hidden="true">logout</mat-icon>
          Sign Out
        </button>

        <a *ngIf="!(authService.isLoggedIn)" routerLink="/login" class="nav-link">
          <mat-icon aria-hidden="true">login</mat-icon>
          Sign In
        </a>
        <a *ngIf="!(authService.isLoggedIn)" routerLink="/register" class="nav-button blue-button">
          <mat-icon aria-hidden="true">rocket_launch</mat-icon>
          Get Started
        </a>
      </div>
    </div>
  </nav>

  <div class="app-content">
    <router-outlet></router-outlet>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 Maximilian Seewald. All rights reserved.</p>
  </footer>
</div>
