<section class="mx-auto max-w-3xl px-6 py-8">
  <div class="mb-4 flex items-center gap-3">
    <div class="setup-icon flex h-9 w-9 items-center justify-center rounded-xl">
      <mat-icon>view_module</mat-icon>
    </div>
    <div>
      <h2 class="text-xl font-semibold tracking-tight">Native Lovelace card</h2>
      <p class="setup-muted text-sm">The add-on keeps the Lovelace resource installed automatically.</p>
    </div>
  </div>

  <div class="grid gap-4">
    <article class="setup-card">
      <div class="mb-4 flex items-center gap-3">
        <mat-icon class="setup-card-icon">extension</mat-icon>
        <h2 class="text-base font-semibold">Install card resource</h2>
      </div>

      <button type="button" class="setup-copy" (click)="installLovelaceResource()" [disabled]="installingResource">
        <mat-icon>{{ installingResource ? 'hourglass_empty' : 'add_to_home_screen' }}</mat-icon>
        {{ installingResource ? 'Installing' : 'Install or update resource' }}
      </button>

      <button type="button" class="setup-secondary" (click)="checkLovelaceResource()" [disabled]="checkingResource">
        <mat-icon>{{ checkingResource ? 'hourglass_empty' : 'fact_check' }}</mat-icon>
        {{ checkingResource ? 'Checking' : 'Check resource' }}
      </button>

      <p *ngIf="resourceInstallStatus" class="setup-status">{{ resourceInstallStatus }}</p>
    </article>
  </div>
</section>
