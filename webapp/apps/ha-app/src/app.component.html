<!-- Mobile-first Home Assistant optimized layout -->
<div class="min-h-screen flex flex-col bg-gray-50">
  <!-- Simplified Mobile Header -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="px-4 py-3 flex justify-between items-center">
      <h1 class="text-lg font-semibold text-gray-900">Home</h1>
      <div class="flex items-center gap-2">
        <button *ngIf="authService.isLoggedIn" (click)="toggleMenu()"
                class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
          <mat-icon class="text-gray-600">menu</mat-icon>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <nav *ngIf="menuOpen && authService.isLoggedIn" class="px-4 py-2 border-t border-gray-200 bg-gray-50">
      <ul class="space-y-1">
        <li>
          <a routerLink="/dashboard" (click)="menuOpen = false"
             class="block px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-200 transition-colors">
            <mat-icon class="inline-block w-5 h-5 mr-2">shopping_cart</mat-icon>
            Shopping List
          </a>
        </li>
        <li>
          <a routerLink="/recipe" (click)="menuOpen = false"
             class="block px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-200 transition-colors">
            <mat-icon class="inline-block w-5 h-5 mr-2">restaurant</mat-icon>
            Recipes
          </a>
        </li>
        <li>
          <button (click)="logout()"
                  class="w-full text-left px-3 py-2 rounded-lg text-sm text-red-600 hover:bg-red-50 transition-colors">
            <mat-icon class="inline-block w-5 h-5 mr-2">logout</mat-icon>
            Sign Out
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-grow overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- Auth Page Navigation -->
  <div *ngIf="!authService.isLoggedIn" class="sticky bottom-0 bg-white border-t border-gray-200">
    <div class="flex gap-2 p-4">
      <a routerLink="/login" class="flex-grow px-4 py-2 rounded-lg text-center text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 transition-colors">
        Sign In
      </a>
      <a routerLink="/register" class="flex-grow px-4 py-2 rounded-lg text-center text-sm font-medium border border-blue-600 text-blue-600 hover:bg-blue-50 transition-colors">
        Register
      </a>
    </div>
  </div>
</div>
