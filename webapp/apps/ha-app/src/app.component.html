<!-- Mobile-first Home Assistant optimized layout -->
<div class="min-h-screen flex flex-col bg-gray-50">
  <!-- Simplified Mobile Header -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
    <div class="px-4 py-3 flex justify-between items-center">
      <h1 class="text-lg font-semibold text-gray-900">Home</h1>
      <div class="flex items-center gap-2">
        <button type="button" (click)="toggleMenu()" aria-label="Open navigation menu"
                class="p-2 rounded-xl hover:bg-gray-100 transition-colors">
          <mat-icon class="text-gray-600">menu</mat-icon>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <nav *ngIf="menuOpen"
         class="absolute right-3 top-full mt-2 w-64 max-w-[calc(100vw-1.5rem)] rounded-2xl border border-gray-200 bg-white p-2 shadow-xl">
      <ul *ngIf="authService.isLoggedIn" class="space-y-1">
        <li>
          <a routerLink="/dashboard" (click)="menuOpen = false"
             class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            <mat-icon class="text-gray-500">shopping_cart</mat-icon>
            Shopping List
          </a>
        </li>
        <li>
          <a routerLink="/recipe" (click)="menuOpen = false"
             class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            <mat-icon class="text-gray-500">restaurant</mat-icon>
            Recipes
          </a>
        </li>
        <li>
          <button (click)="logout()"
                  class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left text-sm font-medium text-red-600 hover:bg-red-50 transition-colors">
            <mat-icon>logout</mat-icon>
            Sign Out
          </button>
        </li>
      </ul>

      <ul *ngIf="!authService.isLoggedIn" class="space-y-1">
        <li>
          <a routerLink="/login" (click)="menuOpen = false"
             class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            <mat-icon class="text-gray-500">login</mat-icon>
            Sign In
          </a>
        </li>
        <li>
          <a routerLink="/register" (click)="menuOpen = false"
             class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
            <mat-icon class="text-gray-500">person_add</mat-icon>
            Register
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-grow overflow-y-auto">
    <router-outlet></router-outlet>
  </main>
</div>
