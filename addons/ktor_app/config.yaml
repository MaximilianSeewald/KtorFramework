name: "Ktor App"
version: "1.1.64"
slug: "ktor_app"
description: "Ktor backend application with Angular frontend for recipes, shopping lists, and more"
arch:
  - amd64
  - armv7
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 8080
ingress_timeout: 60
homeassistant_api: true
panel_icon: "mdi:chef-hat"
panel_title: "Recipes & Shopping"
data: true
network: true
map:
  - type: homeassistant_config
    read_only: false
environment:
  HA_MODE: "true"
