name: "Ktor App"
version: "1.1.57"
slug: "ktor_app"
description: "Ktor backend application with Angular frontend for recipes, shopping lists, and more"
arch:
  - amd64
  - armv7
  - aarch64
startup: application
boot: auto
ingress: true
ingress_port: 8080
ingress_timeout: 60
homeassistant_api: true
panel_icon: "mdi:chef-hat"
panel_title: "Recipes & Shopping"
data: true
network: true
map:
  - type: homeassistant_config
    read_only: false
environment:
  JWT_SECRET_KEY: "change-this-to-a-secure-key"
  HA_MODE: "true"
options:
  jwt_secret: "change-this-to-a-secure-key"
schema:
  jwt_secret: "str"
