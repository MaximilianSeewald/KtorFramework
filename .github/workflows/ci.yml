name: CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

env:
  NODE_VERSION: 22.13.1
  JAVA_VERSION: "21"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Test backend
        run: ./gradlew backend:test --console=plain

  backend-static-security:
    name: Backend Static And Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Cache dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}-
            dependency-check-${{ runner.os }}-
      - name: Run Kotlin lint
        run: ./gradlew ktlintCheck --console=plain
      - name: Require NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "NVD_API_KEY repository secret is required for the OWASP Dependency-Check job."
            echo "Create a free key at https://nvd.nist.gov/developers/request-an-api-key and save it as a GitHub Actions secret named NVD_API_KEY."
            exit 1
          fi
      - name: Run dependency vulnerability scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --console=plain
      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check-report.*
          if-no-files-found: warn

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Test web app
        working-directory: webapp
        run: npx ng test web-app --watch=false --browsers=ChromeHeadless
      - name: Test HA app
        working-directory: webapp
        run: npx ng test ha-app --watch=false --browsers=ChromeHeadless

  frontend-static-security:
    name: Frontend Static And Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Run TypeScript lint
        working-directory: webapp
        run: npm run lint
      - name: Run npm audit
        working-directory: webapp
        run: npm audit --audit-level=high

  frontend-builds:
    name: Frontend Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Build frontends
        working-directory: webapp
        run: npm run build:all
      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-build
          path: deploy/app
          if-no-files-found: error
      - name: Upload HA app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
          if-no-files-found: error

  backend-package:
    name: Backend Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Build backend jar
        run: ./gradlew backend:buildFatJar --console=plain
      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: ktor-jar
          path: backend/build/libs/fat.jar
          if-no-files-found: error

  ha-ingress-playwright:
    name: HA Ingress Playwright
    runs-on: ubuntu-latest
    needs:
      - frontend-builds
      - backend-package
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('webapp/package-lock.json') }}
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: webapp
        run: npx playwright install chromium
      - name: Download HA app artifact
        uses: actions/download-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: ktor-jar
          path: deploy
      - name: Normalize backend jar name
        run: mv deploy/fat.jar deploy/ktor.jar
      - name: Test HA ingress integration
        working-directory: webapp
        run: npm run test:ha-ingress

  packaging-validation:
    name: Packaging Validation
    runs-on: ubuntu-latest
    needs:
      - frontend-builds
      - backend-package
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Download HA app artifact
        uses: actions/download-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: ktor-jar
          path: deploy
      - name: Prepare add-on package
        run: |
          set -euo pipefail
          cp deploy/fat.jar addons/ktor_app/ktor.jar
          rm -rf addons/ktor_app/app
          mkdir -p addons/ktor_app/app
          cp -r deploy/ha-app/. addons/ktor_app/app/
      - name: Validate add-on package
        run: |
          set -euo pipefail
          test -f addons/ktor_app/ktor.jar
          test -f addons/ktor_app/start.sh
          sh -n addons/ktor_app/start.sh
          test "$(find addons/ktor_app/app/browser -maxdepth 1 -name 'main-*.js' | wc -l)" -eq 1
          grep -q "Home Assistant - Shopping & Recipes" addons/ktor_app/app/browser/index.html
          ! grep -R "Maximilian Seewald" addons/ktor_app/app/browser
          grep -q "COPY ktor.jar ktor.jar" addons/ktor_app/Dockerfile
          grep -q "COPY app app" addons/ktor_app/Dockerfile
          grep -q "COPY start.sh start.sh" addons/ktor_app/Dockerfile
      - name: Upload HA add-on package
        uses: actions/upload-artifact@v4
        with:
          name: ha-addon-package
          path: |
            addons/ktor_app/ktor.jar
            addons/ktor_app/app
            addons/ktor_app/Dockerfile
            addons/ktor_app/config.yaml
            addons/ktor_app/DOCS.md
            addons/ktor_app/start.sh
          if-no-files-found: error

  build:
    name: build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-static-security
      - frontend-tests
      - frontend-static-security
      - frontend-builds
      - backend-package
      - ha-ingress-playwright
      - packaging-validation
    if: always()
    steps:
      - name: Report required build status
        run: |
          set -euo pipefail
          needs_json='${{ toJson(needs) }}'

          if echo "$needs_json" | jq -e 'to_entries | any(.value.result != "success")' >/dev/null; then
            state=failure
            description="One or more CI jobs failed"
          else
            state=success
            description="All CI jobs completed successfully"
          fi

          gh api repos/"$GITHUB_REPOSITORY"/statuses/"$GITHUB_SHA" \
            --field state="$state" \
            --field context="build" \
            --field description="$description" \
            --field target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          if [ "$state" != "success" ]; then
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
