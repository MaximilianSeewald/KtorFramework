name: Build_Dev

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.13.1
      - name: Install Dependencies
        run: |
          cd webapp 
          npm ci
      - name: Build Frontends
        run: |
          cd webapp
          npm run build:all
      - name: Test Frontends
        run: |
          cd webapp
          npx ng test web-app --watch=false --browsers=ChromeHeadless
          npx ng test ha-app --watch=false --browsers=ChromeHeadless
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Test Backend
        run: ./gradlew backend:test --console=plain
      - name: Deploy with Gradle
        run: ./gradlew deployGithub
      - name: Report required build status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATE=success
            DESCRIPTION="Build_Dev completed successfully"
          else
            STATE=failure
            DESCRIPTION="Build_Dev did not complete successfully"
          fi

          gh api repos/"$GITHUB_REPOSITORY"/statuses/"$GITHUB_SHA" \
            --field state="$STATE" \
            --field context="build" \
            --field description="$DESCRIPTION" \
            --field target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
