name: Build_Master

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.13.1
      - name: Install Dependencies
        run: |
          cd webapp 
          npm ci
      - name: Build Web FrontEnd
        run: |
          cd webapp
          npm run build
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Deploy with Gradle
        run: ./gradlew deployGithub
      - name: SFTP upload
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec
        with:
          server: 92.205.163.207
          username: ${{secrets.username}}
          password: ${{secrets.password}}
          port: 22
          uploads: |
            deploy/ => ../var/www/html
      - name: stop and start ktor backend
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: 92.205.163.207
          username: ${{secrets.username}}
          password: ${{ secrets.password }}
          port: 22
          script: |
            set -e
            cd ../var/www/html
            if [ -f ktor.pid ]; then
              old_pid="$(cat ktor.pid || true)"
              if [ -n "$old_pid" ] && ps -p "$old_pid" -o args= | grep -q 'java -jar ktor.jar'; then
                kill "$old_pid" || true
                sleep 2
              fi
              rm -f ktor.pid
            fi
            chmod +x ktor.jar
            nohup env KTOR_HOST=127.0.0.1 KTOR_PORT=8090 java -jar ktor.jar > ktor.log 2>&1 &
            echo $! > ktor.pid
            sleep 5
            if ! kill -0 "$(cat ktor.pid)" 2>/dev/null; then
              echo "Ktor process exited during startup"
              tail -n 200 ktor.log
              exit 1
            fi
            if ! curl -fsS http://127.0.0.1:8090/ >/dev/null; then
              echo "Ktor is running but not reachable on localhost:8090"
              tail -n 200 ktor.log
              exit 1
            fi
