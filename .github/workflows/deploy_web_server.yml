name: Deploy Web Server

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  NODE_VERSION: 22.13.1
  JAVA_VERSION: "21"

jobs:
  build-web-app:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Build web frontend
        working-directory: webapp
        run: npm run build
      - name: Upload web app artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-app-build
          path: deploy/app
          if-no-files-found: error

  build-backend-jar:
    name: Build Backend Jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Build backend jar
        run: ./gradlew backend:buildFatJar --console=plain
      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: ktor-jar
          path: backend/build/libs/fat.jar
          if-no-files-found: error

  deploy-web-server:
    name: Deploy Web Server
    runs-on: ubuntu-latest
    needs:
      - build-web-app
      - build-backend-jar
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Download web app artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app-build
          path: deploy/app
      - name: Download backend jar
        uses: actions/download-artifact@v8
        with:
          name: ktor-jar
          path: deploy
      - name: Prepare deploy directory
        run: |
          set -euo pipefail
          mv deploy/fat.jar deploy/ktor.jar
          test -f deploy/app/browser/index.html
          test -f deploy/ktor.jar
      - name: SFTP upload
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec
        with:
          server: 92.205.163.207
          username: ${{ secrets.username }}
          password: ${{ secrets.password }}
          port: 22
          uploads: |
            deploy/ => ../var/www/html
      - name: Stop and start Ktor backend
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        with:
          host: 92.205.163.207
          username: ${{ secrets.username }}
          password: ${{ secrets.password }}
          port: 22
          envs: JWT_SECRET_KEY
          script: |
            set -e
            cd ../var/www/html
            if [ -z "${JWT_SECRET_KEY:-}" ]; then
              echo "JWT_SECRET_KEY repository secret is required"
              exit 1
            fi
            if [ -f ktor.pid ]; then
              old_pid="$(cat ktor.pid || true)"
              if [ -n "$old_pid" ] && ps -p "$old_pid" -o args= | grep -q 'java -jar ktor.jar'; then
                kill "$old_pid" || true
                sleep 2
              fi
              rm -f ktor.pid
            fi
            chmod +x ktor.jar
            nohup env JWT_SECRET_KEY="$JWT_SECRET_KEY" KTOR_HOST=127.0.0.1 KTOR_PORT=8090 java -jar ktor.jar > ktor.log 2>&1 &
            echo $! > ktor.pid
            sleep 5
            if ! kill -0 "$(cat ktor.pid)" 2>/dev/null; then
              echo "Ktor process exited during startup"
              tail -n 200 ktor.log
              exit 1
            fi
            if ! curl -fsS http://127.0.0.1:8090/ >/dev/null; then
              echo "Ktor is running but not reachable on localhost:8090"
              tail -n 200 ktor.log
              exit 1
            fi
