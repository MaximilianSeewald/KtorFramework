name: Deploy Web Server

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  deploy-web-server:
    name: Deploy Web Server
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download web app artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app-build
          path: deploy/app
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: ktor-jar
          path: deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Prepare deploy directory
        run: |
          set -euo pipefail
          mv deploy/fat.jar deploy/ktor.jar
          test -f deploy/app/browser/index.html
          test -f deploy/ktor.jar
      - name: SFTP upload
        uses: Dylan700/sftp-upload-action@50ed7273493353a60dace713957c36b02dd87bec
        with:
          server: ${{ vars.WEB_DEPLOY_HOST }}
          username: ${{ secrets.WEB_DEPLOY_USERNAME }}
          password: ${{ secrets.WEB_DEPLOY_PASSWORD }}
          port: ${{ vars.WEB_DEPLOY_PORT }}
          uploads: |
            deploy/ => ${{ vars.WEB_DEPLOY_DIR }}
      - name: Stop and start Ktor backend
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          WEB_DEPLOY_DIR: ${{ vars.WEB_DEPLOY_DIR }}
          WEB_BACKEND_HOST: ${{ vars.WEB_BACKEND_HOST }}
          WEB_BACKEND_PORT: ${{ vars.WEB_BACKEND_PORT }}
        with:
          host: ${{ vars.WEB_DEPLOY_HOST }}
          username: ${{ secrets.WEB_DEPLOY_USERNAME }}
          password: ${{ secrets.WEB_DEPLOY_PASSWORD }}
          port: ${{ vars.WEB_DEPLOY_PORT }}
          envs: JWT_SECRET_KEY,WEB_DEPLOY_DIR,WEB_BACKEND_HOST,WEB_BACKEND_PORT
          script: |
            set -e
            if [ -z "${JWT_SECRET_KEY:-}" ]; then
              echo "JWT_SECRET_KEY repository secret is required"
              exit 1
            fi
            if [ -z "${WEB_DEPLOY_DIR:-}" ]; then
              echo "WEB_DEPLOY_DIR repository variable is required"
              exit 1
            fi
            if [ -z "${WEB_BACKEND_HOST:-}" ]; then
              echo "WEB_BACKEND_HOST repository variable is required"
              exit 1
            fi
            if [ -z "${WEB_BACKEND_PORT:-}" ]; then
              echo "WEB_BACKEND_PORT repository variable is required"
              exit 1
            fi
            cd "$WEB_DEPLOY_DIR"
            if [ -f ktor.pid ]; then
              old_pid="$(cat ktor.pid || true)"
              if [ -n "$old_pid" ] && ps -p "$old_pid" -o args= | grep -q 'java -jar ktor.jar'; then
                kill "$old_pid" || true
                sleep 2
              fi
              rm -f ktor.pid
            fi
            chmod +x ktor.jar
            nohup env JWT_SECRET_KEY="$JWT_SECRET_KEY" KTOR_HOST="$WEB_BACKEND_HOST" KTOR_PORT="$WEB_BACKEND_PORT" java -jar ktor.jar > ktor.log 2>&1 &
            echo $! > ktor.pid
            sleep 5
            if ! kill -0 "$(cat ktor.pid)" 2>/dev/null; then
              echo "Ktor process exited during startup"
              tail -n 200 ktor.log
              exit 1
            fi
            if ! curl -fsS "http://$WEB_BACKEND_HOST:$WEB_BACKEND_PORT/" >/dev/null; then
              echo "Ktor is running but not reachable at /"
              tail -n 200 ktor.log
              exit 1
            fi
            verify_status="$(curl -sS -o /dev/null -w '%{http_code}' "http://$WEB_BACKEND_HOST:$WEB_BACKEND_PORT/api/verify")"
            if [ "$verify_status" != "401" ]; then
              echo "/api/verify without a token returned $verify_status instead of 401"
              tail -n 200 ktor.log
              exit 1
            fi
