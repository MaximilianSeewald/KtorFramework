name: Security Scan

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "21"

jobs:
  gradle-dependency-check:
    name: Gradle Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Cache dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}-
            dependency-check-${{ runner.os }}-
      - name: Require NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY:-}" ]; then
            echo "NVD_API_KEY repository secret is required for the OWASP Dependency-Check job."
            echo "Create a free key at https://nvd.nist.gov/developers/request-an-api-key and save it as a GitHub Actions secret named NVD_API_KEY."
            exit 1
          fi
      - name: Run dependency vulnerability scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze --console=plain
      - name: Upload dependency-check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check-report.*
          if-no-files-found: warn
