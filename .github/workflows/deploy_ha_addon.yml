name: Deploy HA Add-on

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.13.1
      - name: Install Dependencies
        run: |
          cd webapp 
          npm install
      - name: Build FrontEnd
        run: |
          cd webapp
          npm run build -- --base-href ./ --deploy-url ./
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Build JAR
        run: ./gradlew deployGithub
      - name: Prepare add-on files
        run: |
          cp deploy/ktor.jar addons/ktor_app/
          cp -r deploy/app addons/ktor_app/
      - name: Get current version
        if: |
          github.actor != 'github-actions[bot]' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        id: version
        run: |
          version=$(grep '^version:' addons/ktor_app/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "current_version=$version" >> $GITHUB_OUTPUT
      - name: Bump version
        if: |
          github.actor != 'github-actions[bot]' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        id: bump
        run: |
          version=${{ steps.version.outputs.current_version }}
          IFS='.' read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          sed -i "s/version: \"$version\"/version: \"$new_version\"/" addons/ktor_app/config.yaml
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Bump add-on version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          title: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          branch: version-bump
          delete-branch: true
      - name: Enable Auto Merge
        run: |
          PR=${{ steps.cpr.outputs.pull-request-number }}
          
          for i in {1..30}; do
            STATE=$(gh pr view $PR --json mergeStateStatus -q .mergeStateStatus)
            echo "State: $STATE"
          
            if [ "$STATE" = "CLEAN" ]; then
              gh pr merge $PR --auto --squash
              exit 0
            fi
          
            sleep 10
          done
          
          echo "PR never became mergeable"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
