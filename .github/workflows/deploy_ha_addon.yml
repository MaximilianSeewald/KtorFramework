name: Deploy Home Assistant Add-on

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

env:
  NODE_VERSION: 22.13.1
  JAVA_VERSION: "21"

jobs:
  build-ha-app:
    name: Build HA App
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        working-directory: webapp
        run: npm ci
      - name: Build HA frontend
        working-directory: webapp
        run: npm run build:ha
      - name: Upload HA app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
          if-no-files-found: error

  build-backend-jar:
    name: Build Backend Jar
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Build backend jar
        run: ./gradlew backend:buildFatJar --console=plain
      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: ktor-jar
          path: backend/build/libs/fat.jar
          if-no-files-found: error

  package-bump-and-merge:
    name: Package, Bump Version, And Merge
    runs-on: ubuntu-latest
    needs:
      - build-ha-app
      - build-backend-jar
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Download HA app artifact
        uses: actions/download-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: ktor-jar
          path: deploy
      - name: Prepare add-on files
        run: |
          set -euo pipefail
          cp deploy/fat.jar addons/ktor_app/ktor.jar
          rm -rf addons/ktor_app/app
          mkdir -p addons/ktor_app/app
          cp -r deploy/ha-app/. addons/ktor_app/app/
      - name: Validate add-on package
        run: |
          set -euo pipefail
          test -f addons/ktor_app/ktor.jar
          test -f addons/ktor_app/start.sh
          sh -n addons/ktor_app/start.sh
          test "$(find addons/ktor_app/app/browser -maxdepth 1 -name 'main-*.js' | wc -l)" -eq 1
          grep -q "Home Assistant - Shopping & Recipes" addons/ktor_app/app/browser/index.html
          ! grep -R "Maximilian Seewald" addons/ktor_app/app/browser
          grep -q "COPY ktor.jar ktor.jar" addons/ktor_app/Dockerfile
          grep -q "COPY app app" addons/ktor_app/Dockerfile
          grep -q "COPY start.sh start.sh" addons/ktor_app/Dockerfile
      - name: Get current version
        id: version
        run: |
          version=$(grep '^version:' addons/ktor_app/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "current_version=$version" >> "$GITHUB_OUTPUT"
      - name: Bump version
        id: bump
        run: |
          version=${{ steps.version.outputs.current_version }}
          IFS='.' read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          sed -i "s/version: \"$version\"/version: \"$new_version\"/" addons/ktor_app/config.yaml
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.token }}
          commit-message: "Bump add-on version to ${{ steps.bump.outputs.new_version }}"
          title: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          branch: version-bump
          delete-branch: true
      - name: Trigger CI
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref version-bump
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
      - name: Wait for checks and merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          set -euo pipefail
          PR=${{ steps.cpr.outputs.pull-request-number }}
          gh auth status --hostname github.com

          for i in {1..180}; do
            checks_json="$(gh pr checks "$PR" --repo "$GITHUB_REPOSITORY" --json name,state,bucket || echo '[]')"
            echo "$checks_json"

            all_passed=true
            failed_checks=()
            pending_checks=()

            while IFS= read -r check_name; do
              [ -n "$check_name" ] || continue
              bucket="$(echo "$checks_json" | jq -r --arg name "$check_name" '.[] | select(.name == $name) | .bucket // empty' | head -n 1)"
              state="$(echo "$checks_json" | jq -r --arg name "$check_name" '.[] | select(.name == $name) | .state // empty' | head -n 1)"

              if [ -z "$bucket$state" ]; then
                all_passed=false
                pending_checks+=("$check_name: missing")
              elif [ "$bucket" = "fail" ] || [[ "$state" =~ ^(FAILURE|ERROR|CANCELLED|TIMED_OUT)$ ]]; then
                failed_checks+=("$check_name: ${state:-$bucket}")
              elif [ "$bucket" != "pass" ] && [ "$state" != "SUCCESS" ]; then
                all_passed=false
                pending_checks+=("$check_name: ${state:-$bucket}")
              fi
            done <<< "$REQUIRED_CHECKS"

            if [ "${#failed_checks[@]}" -gt 0 ]; then
              printf 'Required checks failed: %s\n' "${failed_checks[*]}"
              exit 1
            fi

            if [ "$all_passed" = "true" ]; then
              gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash
              exit 0
            fi

            printf 'Waiting for required checks: %s\n' "${pending_checks[*]}"
            sleep 10
          done

          echo "Required CI checks did not succeed for PR $PR after waiting"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          REQUIRED_CHECKS: |
            Backend Tests
            Backend Static And Security
            Dependency Review
            Frontend Tests
            Frontend Static And Security
            Frontend Builds
            Backend Package
            HA Ingress Playwright
            Packaging Validation
            build
