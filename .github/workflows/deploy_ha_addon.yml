name: Deploy HA Add-on

on:
  push:
    branches:
      - master

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.13.1
      - name: Install Dependencies
        run: |
          cd webapp 
          npm ci
      - name: Build HA FrontEnd
        run: |
          cd webapp
          npm run build:ha
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Build JAR
        run: ./gradlew deployGithub
      - name: Prepare add-on files
        run: |
          cp deploy/ktor.jar addons/ktor_app/
          rm -rf addons/ktor_app/app
          mkdir -p addons/ktor_app/app
          cp -r deploy/ha-app/. addons/ktor_app/app/
          test -f addons/ktor_app/start.sh
          test "$(find addons/ktor_app/app/browser -maxdepth 1 -name 'main-*.js' | wc -l)" -eq 1
          grep -q "Home Assistant - Shopping & Recipes" addons/ktor_app/app/browser/index.html
          ! grep -R "Maximilian Seewald" addons/ktor_app/app/browser
      - name: Get current version
        if: |
          github.actor != 'github-actions[bot]' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        id: version
        run: |
          version=$(grep '^version:' addons/ktor_app/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "current_version=$version" >> $GITHUB_OUTPUT
      - name: Bump version
        if: |
          github.actor != 'github-actions[bot]' &&
          !contains(github.event.head_commit.message, '[skip ci]')
        id: bump
        run: |
          version=${{ steps.version.outputs.current_version }}
          IFS='.' read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          sed -i "s/version: \"$version\"/version: \"$new_version\"/" addons/ktor_app/config.yaml
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ github.token }}
          commit-message: "Bump add-on version to ${{ steps.bump.outputs.new_version }}"
          title: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          branch: version-bump
          delete-branch: true
      - name: Trigger PR build
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh workflow run pr_dev.yml --repo "$GITHUB_REPOSITORY" --ref version-bump
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
      - name: Wait for checks and merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          PR=${{ steps.cpr.outputs.pull-request-number }}
          HEAD_SHA="$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)"
          gh auth status --hostname github.com

          BUILD_CHECK_FOUND=false
          for i in {1..60}; do
            gh pr checks "$PR" --repo "$GITHUB_REPOSITORY" >/tmp/pr-checks.txt 2>&1 || true
            cat /tmp/pr-checks.txt

            if grep -q "^build[[:space:]]" /tmp/pr-checks.txt; then
              BUILD_CHECK_FOUND=true
              break
            fi

            sleep 10
          done

          if [ "$BUILD_CHECK_FOUND" != "true" ]; then
            echo "Required build check was not reported for PR $PR after waiting"
            exit 1
          fi

          for i in {1..180}; do
            BUILD_STATE="$(gh api repos/"$GITHUB_REPOSITORY"/commits/"$HEAD_SHA"/status --jq '.statuses[] | select(.context == "build") | .state' | head -n 1)"

            if [ "$BUILD_STATE" = "success" ]; then
              break
            fi

            if [ "$BUILD_STATE" = "failure" ] || [ "$BUILD_STATE" = "error" ]; then
              echo "Required build check ended with state: $BUILD_STATE"
              exit 1
            fi

            echo "Waiting for required build status on $HEAD_SHA; current state: ${BUILD_STATE:-missing}"
            sleep 10
          done

          if [ "$BUILD_STATE" != "success" ]; then
            echo "Required build check did not succeed for PR $PR after waiting"
            exit 1
          fi

          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
