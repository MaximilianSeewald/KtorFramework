name: Deploy HA Add-on

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.13.1
      - name: Install Dependencies
        run: |
          cd webapp 
          npm install
      - name: Build FrontEnd
        run: |
          cd webapp
          npm run build
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b
      - name: Build JAR
        run: ./gradlew deployGithub
      - name: Get current version
        if: github.actor != 'github-actions[bot]'
        id: version
        run: |
          version=$(grep '^version:' addons/ktor_app/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "current_version=$version" >> $GITHUB_OUTPUT
      - name: Bump version
        if: github.actor != 'github-actions[bot]'
        id: bump
        run: |
          version=${{ steps.version.outputs.current_version }}
          IFS='.' read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          sed -i "s/version: \"$version\"/version: \"$new_version\"/" addons/ktor_app/config.yaml
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        if: github.actor != 'github-actions[bot]'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          title: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          branch: version-bump
          delete-branch: true
