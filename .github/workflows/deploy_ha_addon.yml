name: Deploy Home Assistant Add-on

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  package-and-open-pr:
    name: Package And Open Version Bump PR
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login != 'github-actions[bot]' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip addon-bump]')
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Verify CI commit is current
        id: current
        run: |
          set -euo pipefail
          if [ "$(git rev-parse HEAD)" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "Master moved after this CI run; skipping stale generated package."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "current=true" >> "$GITHUB_OUTPUT"
      - name: Download HA app artifact
        if: steps.current.outputs.current == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ha-app-build
          path: deploy/ha-app
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Download backend jar
        if: steps.current.outputs.current == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ktor-jar
          path: deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Prepare add-on files
        if: steps.current.outputs.current == 'true'
        run: |
          set -euo pipefail
          cp deploy/fat.jar addons/ktor_app/ktor.jar
          rm -rf addons/ktor_app/app
          mkdir -p addons/ktor_app/app
          cp -r deploy/ha-app/. addons/ktor_app/app/
      - name: Validate add-on package
        if: steps.current.outputs.current == 'true'
        run: |
          set -euo pipefail
          test -f addons/ktor_app/ktor.jar
          test -f addons/ktor_app/start.sh
          sh -n addons/ktor_app/start.sh
          test "$(find addons/ktor_app/app/browser -maxdepth 1 -name 'main-*.js' | wc -l)" -eq 1
          grep -q "Home Assistant - Shopping & Recipes" addons/ktor_app/app/browser/index.html
          ! grep -R "Maximilian Seewald" addons/ktor_app/app/browser
          grep -q "COPY ktor.jar ktor.jar" addons/ktor_app/Dockerfile
          grep -q "COPY app app" addons/ktor_app/Dockerfile
          grep -q "COPY start.sh start.sh" addons/ktor_app/Dockerfile
      - name: Get current version
        if: steps.current.outputs.current == 'true'
        id: version
        run: |
          version=$(grep '^version:' addons/ktor_app/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "current_version=$version" >> "$GITHUB_OUTPUT"
      - name: Bump version
        if: steps.current.outputs.current == 'true'
        id: bump
        run: |
          version=${{ steps.version.outputs.current_version }}
          IFS='.' read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"
          sed -i "s/version: \"$version\"/version: \"$new_version\"/" addons/ktor_app/config.yaml
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
      - name: Create Pull Request
        id: cpr
        if: steps.current.outputs.current == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          commit-message: "Bump add-on version to ${{ steps.bump.outputs.new_version }}"
          title: Bump add-on version to ${{ steps.bump.outputs.new_version }}
          body: |
            Generated from successful CI run ${{ github.event.workflow_run.html_url }}.

            Auto-merge is enabled, but branch protection and required checks decide when it lands.
          branch: version-bump
          delete-branch: true
      - name: Enable auto-merge
        if: steps.current.outputs.current == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --auto \
            --delete-branch \
            --subject "Bump add-on version to ${{ steps.bump.outputs.new_version }} [skip addon-bump]" \
            --body "Generated add-on package from successful CI run ${{ github.event.workflow_run.html_url }}."
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
