# Copy this file to config.properties for local or split-origin deployments.
#
# Production same-origin deployments do not need CORS configuration because
# Ktor serves both the Angular app and /api from the same origin.

# Use development to automatically allow local Angular dev servers on ports
# 4200 and 4201 when CORS_ALLOWED_ORIGINS is not set.
APP_ENV=production

# Optional comma-separated origins for split-origin deployments.
# CORS_ALLOWED_ORIGINS=https://example.com,https://www.example.com

# Required when APP_ENV=production. Use an absolute path outside the app
# working directory. ./data/db is allowed only for APP_ENV=development.
# DATABASE_PATH=/var/lib/ktor-framework/db

# Optional backup directory. Defaults to /data/backups in Home Assistant mode
# and to a backups directory next to DATABASE_PATH otherwise.
# DATABASE_BACKUP_PATH=/var/backups/ktor-framework

# Optional H2 URL mode suffix. Leave empty unless you intentionally need one.
# Allowed value: AUTO_SERVER=TRUE
# H2_MODE=

# Lightweight per-client rate limiting for public-sensitive endpoints.
# Applies to login, signup, Home Assistant session creation, and group
# password checks.
# RATE_LIMIT_WINDOW_SECONDS=60
# RATE_LIMIT_MAX_REQUESTS=120
