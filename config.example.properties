# Copy this file to config.properties for local or split-origin deployments.
#
# Production same-origin deployments do not need CORS configuration because
# Ktor serves both the Angular app and /api from the same origin.

# Use development to automatically allow local Angular dev servers on ports
# 4200 and 4201 when CORS_ALLOWED_ORIGINS is not set.
APP_ENV=production

# Optional comma-separated origins for split-origin deployments.
# CORS_ALLOWED_ORIGINS=https://example.com,https://www.example.com
